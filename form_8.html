<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body style="background-color:antiquewhite">

  <h1>Secure Account Registration</h1>

  <form action="https://onlinesbi.sbi.bank.in/" method="post">

    <label for="fullname">Full Name:</label>
    <input type="text" id="fullname" name="fullname">
    <br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" name="fullname" required>
    <br><br>

    <label for="pnumber">Phone Number:</label>
    <input type="tel" id="pnumber" name="pnumber">
    <br><br>

    <label for="dob">Date Of Birth:</label>
    <input type="date" id="dob" name="dob" required>
    <br><br>

    <label>Gender:</label>
    <br>
    <input type="radio" id="male" name="gender" value="male">
    <label for="male">Male</label>
    <br>
    <input type="radio" id="Female" name="gender" value="female">
    <label for="Female">Female</label>
    <br>
    <input type="radio" id="Other" name="gender" value="other">
    <label for="Other">Other</label>
    <br><br>

    <label for="nationality">Nationality:</label>

    <select name="nationality" id="nationality" required>
      <option value="">--select--</option>
      <option value="India">India</option>
      <option value="Palestine">Palestine</option>
      <option value="Turkey">Turkey</option>
      <option value="Afghanistan">Afghanistan</option>
    </select>
    <br><br>

    <label for="address">Address:</label>
    <br>
    <textarea name="address" id="address">e.g pune,india.</textarea>
    <br><br>

    <label for="accounttype">Account Type:</label>
    <br>
    <input type="radio" id="Savings" name="accounttype" value="savings">
    <label for="Savings">Savings</label>
    <br>
    <input type="radio" id="Current" name="accounttype" value="Current">
    <label for="Current">Current</label>
    <br>
    <input type="radio" id="Business" name="accounttype" value="Business">
    <label for="Business">Business</label>
    <br><br>

    <label for="amount">Initial Deposit Amount:</label>
    <input type="number" id="amount" name="amount">
    <br><br>

    <label for="username">Username:</label>
    <input type="text" id="username" name="username" required>
    <br><br>

    <label for="Password">Password:</label>
    <input type="password" id="Password" name="Password" required>
    <br><br>

    <label for="ConfirmPassword">Confirm Password:</label>
    <input type="password" id="ConfirmPassword" name="ConfirmPassword" required>
    <br><br>

    <label for="file">Upload ID Proof:</label>
    <input type="file" id="file" name="file">
    <br><br>

    <label for="secquest">Security Question:</label>

    <select name="secquest" id="secquest">
      <option value="">--select--</option>
      <option value="schoolname">your primary school name?</option>
      <option value="bestfrie">who is your best friend?</option>
      <option value="luckynum">wht is your lucky number?</option>
      <option value="favperson">who is your favourite person?</option>
    </select>
    <br><br>

    <label for="secanswer">Security Answer:</label>
    <input type="text" id="secanswer" name="secanswer">
    <br><br>


    <input type="checkbox" id="termcon" name="termcon" required>
    <label for="termcon">agree to terms & conditions</label>
    <br><br>

    <input type="submit" value="submit" required>
    <input type="reset" value="reset" >

  </form>

</body>

</html>
